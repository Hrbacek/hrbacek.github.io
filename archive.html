---
layout: default
title: Archive
---
<header class="site-header">
  <h1>Everything I wrote</h1>
</header>

<ul class="post-list">
  {% for post in site.posts %}
  <li>
    <span class="date">{{ post.date | date: "%b %d, %Y" }}</span>
    <a href="{{ post.url }}">{{ post.title }}</a>
  </li>
  {% endfor %}
</ul>
