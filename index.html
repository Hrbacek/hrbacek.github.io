---
layout: default
title: Home
---
<header class="site-header">
  <h1>{{ site.title }}</h1>
  <p>{{ site.description }}</p>
</header>

<ul class="post-list">
  {% for post in site.posts %}
  <li>
    <span class="date">{{ post.date | date: "%b %d, %Y" }}</span>
    <a href="{{ post.url }}">{{ post.title }}</a>
  </li>
  {% endfor %}
</ul>
